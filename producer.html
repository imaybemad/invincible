<!DOCTYPE html><html lang="en">
<head>
<meta charset="UTF-8">
<title>Producer Panel</title><style>
body {
    margin:0;
    font-family: Arial;
    color:white;
    background:
    radial-gradient(circle at top left, rgba(229,9,20,0.25), transparent),
    linear-gradient(to bottom, #000000, #0a0a0a);
}

/* NAVBAR */
nav{
    position: sticky;
    top: 0;
    z-index: 1000;

    padding:15px 25px;
    background: linear-gradient(to bottom, rgba(0,0,0,0.95), rgba(0,0,0,0.6));
    
    display:flex;
    justify-content:space-between;
    align-items:center;

    border-bottom: 1px solid rgba(255,0,0,0.3);
}

nav .title{
    font-size:20px;
    font-weight:bold;
    color:#e50914;
}

nav a{
    color:white;
    text-decoration:none;
    margin-left:20px;
}

nav a:hover{
    color:#e50914;
}

/* MAIN */
.container{
    padding:40px;
    text-align:center;
}

h1{
    margin-bottom:30px;
}

/* CARDS */
.options{
    display:flex;
    flex-wrap:wrap;
    justify-content:center;
    gap:30px;
}

.card{
    width:300px;
    height:180px;
    background:#111;
    border:1px solid #333;
    border-radius:10px;

    display:flex;
    align-items:center;
    justify-content:center;
    text-align:center;

    cursor:pointer;
    transition:0.3s;
}

.card:hover{
    transform:scale(1.05);
    border-color:#e50914;
    background: rgba(229,9,20,0.1);
}

.card h2{
    padding:15px;
}
</style></head><body><nav>

</div><div class="card" onclick="openPage('producer-agreement.html')">
    <h2>🤝 Producer Agreement</h2>
</div></div></div><script>

    window.location.href = page;
}
</script></body>
</html>
